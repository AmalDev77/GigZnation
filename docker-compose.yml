services:
  app:
    image: 890615325331.dkr.ecr.ap-south-1.amazonaws.com/gigznation-app:latest
    container_name: gigznation-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
